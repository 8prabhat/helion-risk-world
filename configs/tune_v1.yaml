# HelionRiskWorld — V1 base config (SPEC.md §29).
# V1 uses candles + OI + futures + India VIX + expiry/event flags + (optional) option-chain
# snapshots + SIMULATED portfolio states + a conservative cost model. NO historical tick/depth.

project: helion_risk_world
seed: 7

data:
  universe: [BANKNIFTY, NIFTY, FINNIFTY, HDFCBANK, ICICIBANK, SBIN, AXISBANK, KOTAKBANK]
  base_interval: "5min"
  lookback_bars: 96
  n_strikes: 5                 # ATM-5 .. ATM+5  -> 11 strike tokens
  feature_cache_dir: feature_cache
  data_sources_path: configs/data_sources.yaml
  use_historical_depth: false # V1 guard — must remain false

model:
  size: small                 # small | medium  (large = GPU cluster only)
  latent_dim: 128
  temporal_layers: 2
  futures_conv_layers: 2
  cross_asset_heads: 4
  fusion: gated
  rollout_samples: 16
  dropout: 0.1
  barrier_mode: derived       # derived = barrier logits tied to excursion-vs-barrier geometry; this is the stable managed-trade path
  return_target_mode: timeout # timeout = conditional return on no-barrier paths; this matches the planner's stop/target/timeout mixture contract

horizons:
  base_interval: "5min"
  horizon_steps: [3, 6, 12]   # 15 / 30 / 60 minutes

loss:
  weights:
    return: 1.0
    direction: 0.5
    volatility: 0.3
    mae: 0.15
    mfe: 0.15
    barrier: 0.5
    regime: 0.3
    calibration: 0.4
    uncertainty: 0.2
    ood: 0.2

planner:
  sizes: [0.0, 0.1, 0.25, 0.5, 1.0]
  min_edge_over_no_trade: 0.0
  penalties:
    slip: 1.0
    dd: 1.5
    cvar: 2.0
    margin: 1.0
    unc: 1.0
    overtrade: 0.5
    concentration: 0.5
    exec: 2.0

execution:
  brokerage_per_order: 20.0
  stt_rate: 0.000625
  exchange_txn_rate: 0.00035
  gst_rate: 0.18
  sebi_rate: 0.000001
  stamp_duty_rate: 0.00003
  half_spread_bps: 0.0003
  slippage_bps: 0.0002
  default_spread_ticks: 1.0
  tick_size: 0.2
  base_fill_prob: 0.95
  realism_high_cost_frac: 0.25
  realism_low_cost_frac: 0.75
  instrument_specs:
    BANKNIFTY:
      lot_size: 30
      tick_size: 0.2
      margin_fraction: 0.25
    BANKNIFTY_FUT:
      lot_size: 30
      tick_size: 0.2
      margin_fraction: 0.25

risk_shield:
  daily_loss_limit: 0.02
  max_drawdown: 0.10
  free_margin_floor: 0.20
  uncertainty_block_threshold: 0.8
  ood_block_threshold: 0.9
  slippage_block_threshold: 0.5
  max_exposure: 1.0
  max_trades_per_day: 10
  consecutive_loss_cooldown: 4
  require_edge_over_cost: true
  blackout_block: true

training:
  device: auto                # mps on Mac Studio
  batch_size: 256
  grad_accum_steps: 1
  pretrain_epochs: 0          # Stage 2 optional encoder pretraining; set > 0 to enable
  # Gap (in bars) between context/future windows for Stage 2 future-latent prediction.
  # Matches the management horizon (horizons.horizon_steps below) so the task predicts a
  # genuinely future latent rather than a near-identical, barely-shifted window (review
  # finding H6 — the old default of 1 made this task nearly trivial at lookback_bars=96).
  pretrain_gap_bars: 12
  max_epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 8
  checkpoint_dir: runs
  train_fraction: 0.70
  val_fraction: 0.15
  n_folds: 1
  embargo_bars: 192           # >= H192 management/label horizon

risk_profile: banknifty_futures_conservative  # default account sized to make the BankNIFTY futures target tradeable

strategy:
  name: medium_frequency

promotion:
  require_calibration_pass: true
  require_paper_report: false
  min_total_return: 0.0
  min_annualized_return: 0.15
  min_sharpe: 1.0
  min_profit_factor: 1.1
  max_drawdown: 0.15
  min_hit_rate: 0.45
  min_trades: 10
  max_paper_drift_score: 0.3
  max_paper_data_failure_rate: 0.1
  max_paper_reject_rate: 0.2
  fail_workflow_on_reject: false
